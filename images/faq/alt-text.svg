<svg xmlns="http://www.w3.org/2000/svg" width="520" height="200">
  <text x="4" y="16" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="700" fill="#424242">alt 속성에 따른 스크린리더 동작</text>

  <!-- Case 1: alt="" 장식용 -->
  <rect x="4" y="28" width="512" height="48" rx="6" fill="#fff" stroke="#E0E0E0"/>
  <rect x="16" y="36" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0"/>
  <circle cx="28" cy="48" r="4" fill="#E0E0E0"/>
  <circle cx="36" cy="44" r="3" fill="#E0E0E0"/>
  <circle cx="36" cy="54" r="3" fill="#E0E0E0"/>
  <circle cx="22" cy="44" r="3" fill="#E0E0E0"/>
  <circle cx="22" cy="54" r="3" fill="#E0E0E0"/>
  <text x="64" y="48" font-family="monospace" font-size="13" fill="#424242">&lt;img src="deco.png" alt=""&gt;</text>
  <text x="64" y="64" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#757575">🔇 건너뜀 (장식용 이미지에 사용)</text>
  <text x="460" y="56" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="700" fill="#22C55E">GOOD</text>

  <!-- Case 2: alt 생략 -->
  <rect x="4" y="88" width="512" height="48" rx="6" fill="#fff" stroke="#E0E0E0"/>
  <rect x="16" y="96" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0"/>
  <polygon points="22,122 32,106 42,122" fill="#E0E0E0"/>
  <polygon points="18,122 26,112 34,122" fill="#D1D5DB"/>
  <circle cx="38" cy="104" r="3" fill="#E0E0E0"/>
  <text x="64" y="108" font-family="monospace" font-size="13" fill="#424242">&lt;img src="banner_2024_v3.png"&gt;</text>
  <text x="64" y="124" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#757575">🔊 "banner_2024_v3.png 이미지" (파일명 읽음)</text>
  <text x="468" y="116" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="700" fill="#EF4444">BAD</text>

  <!-- Case 3: alt="설명" 장바구니 -->
  <rect x="4" y="148" width="512" height="48" rx="6" fill="#fff" stroke="#E0E0E0"/>
  <rect x="16" y="156" width="32" height="32" rx="4" fill="#EFF6FF" stroke="#E0E0E0"/>
  <path d="M24,170 L26,164 L38,164 L40,170" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="26" y="170" width="12" height="8" rx="2" fill="none" stroke="#2563EB" stroke-width="1.5"/>
  <circle cx="29" cy="181" r="1.5" fill="#2563EB"/>
  <circle cx="35" cy="181" r="1.5" fill="#2563EB"/>
  <circle cx="38" cy="160" r="5" fill="#EF4444"/>
  <text x="36" y="163" font-family="Noto Sans KR, sans-serif" font-size="7" font-weight="700" fill="#fff">3</text>
  <text x="64" y="168" font-family="monospace" font-size="13" fill="#424242">&lt;img src="cart.svg" alt="장바구니 3개 상품"&gt;</text>
  <text x="64" y="184" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#757575">🔊 "장바구니 3개 상품 이미지" (의미 전달)</text>
  <text x="460" y="176" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="700" fill="#22C55E">GOOD</text>
</svg>
