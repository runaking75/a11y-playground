<svg xmlns="http://www.w3.org/2000/svg" width="520" height="170">
  <defs>
    <pattern id="stripe" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="6" height="6" fill="#F97316"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#fff" stroke-width="2"/>
    </pattern>
    <pattern id="dot" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#8B5CF6"/>
      <circle cx="3" cy="3" r="1.5" fill="#fff"/>
    </pattern>
  </defs>

  <text x="8" y="14" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="700" fill="#424242">데이터 시각화 접근성</text>

  <!-- BAD icon + label: y=30 통일 -->
  <path d="M14,26 L22,34 M22,26 L14,34" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
  <text x="28" y="34" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#EF4444">색에만 의존</text>

  <!-- GOOD icon + label: y=30 통일 -->
  <path d="M277,26 L280,32 L287,24" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="294" y="34" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#22C55E">접근성 준수</text>

  <!-- BAD 카드 (chart-table과 동일 구조) -->
  <rect x="8" y="40" width="244" height="124" rx="6" fill="#fff" stroke="#E0E0E0"/>

  <!-- Y축 -->
  <text x="20" y="62" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#757575">300</text>
  <text x="20" y="82" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#757575">200</text>
  <text x="20" y="102" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#757575">100</text>
  <text x="28" y="122" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#757575">0</text>
  <text x="18" y="52" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#9E9E9E">만원</text>

  <!-- 그리드 -->
  <line x1="44" y1="58" x2="240" y2="58" stroke="#F5F5F5" stroke-width="1"/>
  <line x1="44" y1="78" x2="240" y2="78" stroke="#F5F5F5" stroke-width="1"/>
  <line x1="44" y1="98" x2="240" y2="98" stroke="#F5F5F5" stroke-width="1"/>
  <line x1="44" y1="118" x2="240" y2="118" stroke="#F5F5F5" stroke-width="1"/>

  <!-- Q1 -->
  <rect x="56" y="68" width="22" height="50" fill="#93C5FD"/>
  <rect x="80" y="78" width="22" height="40" fill="#FDBA74"/>
  <rect x="104" y="74" width="22" height="44" fill="#C4B5FD"/>

  <!-- Q2 -->
  <rect x="146" y="62" width="22" height="56" fill="#93C5FD"/>
  <rect x="170" y="72" width="22" height="46" fill="#FDBA74"/>
  <rect x="194" y="68" width="22" height="50" fill="#C4B5FD"/>

  <!-- X축 -->
  <text x="80" y="132" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#424242">Q1</text>
  <text x="170" y="132" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#424242">Q2</text>

  <!-- 범례 -->
