  <!-- Y축 -->
  <text x="284" y="62" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#757575">300</text>
  <text x="284" y="82" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#757575">200</text>
  <text x="284" y="102" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#757575">100</text>
