  <!-- 범례 -->
  <rect x="318" y="142" width="12" height="12" fill="#2563EB"/>
  <text x="334" y="153" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#424242">매출</text>
  <rect x="368" y="142" width="12" height="12" fill="url(#stripe)"/>
  <text x="384" y="153" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#424242">비용</text>
  <rect x="418" y="142" width="12" height="12" fill="url(#dot)"/>
  <text x="434" y="153" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#424242">이익</text>
</svg>
