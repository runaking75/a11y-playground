  <!-- 그리드 -->
  <line x1="308" y1="58" x2="506" y2="58" stroke="#F5F5F5" stroke-width="1"/>
  <line x1="308" y1="78" x2="506" y2="78" stroke="#F5F5F5" stroke-width="1"/>
  <line x1="308" y1="98" x2="506" y2="98" stroke="#F5F5F5" stroke-width="1"/>
  <line x1="308" y1="118" x2="506" y2="118" stroke="#F5F5F5" stroke-width="1"/>

  <!-- Q1 -->
  <rect x="318" y="68" width="22" height="50" fill="#2563EB"/>
  <rect x="342" y="78" width="22" height="40" fill="url(#stripe)"/>
  <rect x="366" y="74" width="22" height="44" fill="url(#dot)"/>
  <text x="322" y="64" font-family="Noto Sans KR, sans-serif" font-size="8" font-weight="600" fill="#2563EB">250</text>
  <text x="346" y="74" font-family="Noto Sans KR, sans-serif" font-size="8" font-weight="600" fill="#F97316">180</text>
  <text x="370" y="70" font-family="Noto Sans KR, sans-serif" font-size="8" font-weight="600" fill="#8B5CF6">200</text>

  <!-- Q2 -->
  <rect x="408" y="62" width="22" height="56" fill="#2563EB"/>
  <rect x="432" y="72" width="22" height="46" fill="url(#stripe)"/>
  <rect x="456" y="64" width="22" height="54" fill="url(#dot)"/>
  <text x="412" y="58" font-family="Noto Sans KR, sans-serif" font-size="8" font-weight="600" fill="#2563EB">280</text>
  <text x="436" y="68" font-family="Noto Sans KR, sans-serif" font-size="8" font-weight="600" fill="#F97316">200</text>
