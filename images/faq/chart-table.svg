<svg xmlns="http://www.w3.org/2000/svg" width="520" height="170">
  <text x="8" y="14" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="700" fill="#424242">차트와 동일 데이터를 테이블로 병행 제공 (SC 1.1.1)</text>

  <!-- 좌: 차트 -->
  <rect x="8" y="26" width="244" height="136" rx="6" fill="#fff" stroke="#E0E0E0"/>

  <!-- Y축 -->
  <text x="18" y="56" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#757575">300</text>
  <text x="18" y="80" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#757575">200</text>
  <text x="18" y="104" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#757575">100</text>
  <text x="26" y="128" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#757575">0</text>
  <text x="16" y="46" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#9E9E9E">만원</text>

  <!-- 그리드 -->
  <line x1="40" y1="52" x2="240" y2="52" stroke="#F5F5F5" stroke-width="1"/>
  <line x1="40" y1="76" x2="240" y2="76" stroke="#F5F5F5" stroke-width="1"/>
  <line x1="40" y1="100" x2="240" y2="100" stroke="#F5F5F5" stroke-width="1"/>
  <line x1="40" y1="124" x2="240" y2="124" stroke="#F5F5F5" stroke-width="1"/>

  <!-- Q1 -->
  <rect x="44" y="74" width="14" height="50" fill="#2563EB"/>
  <rect x="60" y="84" width="14" height="40" fill="#F97316"/>
  <rect x="76" y="104" width="14" height="20" fill="#8B5CF6"/>

  <!-- Q2 -->
  <rect x="98" y="64" width="14" height="60" fill="#2563EB"/>
  <rect x="114" y="80" width="14" height="44" fill="#F97316"/>
  <rect x="130" y="102" width="14" height="22" fill="#8B5CF6"/>

  <!-- Q3 -->
  <rect x="152" y="68" width="14" height="56" fill="#2563EB"/>
  <rect x="168" y="70" width="14" height="54" fill="#F97316"/>
  <rect x="184" y="96" width="14" height="28" fill="#8B5CF6"/>

  <!-- Q4 -->
  <rect x="206" y="60" width="14" height="64" fill="#2563EB"/>
  <rect x="222" y="66" width="14" height="52" fill="#F97316"/>
  <rect x="238" y="98" width="14" height="20" fill="#8B5CF6"/>

  <!-- X축 -->
  <text x="62" y="132" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#424242" text-anchor="middle">Q1</text>
  <text x="116" y="132" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#424242" text-anchor="middle">Q2</text>
  <text x="170" y="132" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#424242" text-anchor="middle">Q3</text>
  <text x="224" y="132" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#424242" text-anchor="middle">Q4</text>

  <!-- 범례 -->
  <rect x="44" y="144" width="10" height="10" fill="#2563EB"/>
  <text x="58" y="153" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#424242">매출</text>
  <rect x="98" y="144" width="10" height="10" fill="#F97316"/>
  <text x="112" y="153" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#424242">비용</text>
  <rect x="152" y="144" width="10" height="10" fill="#8B5CF6"/>
  <text x="166" y="153" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#424242">이익</text>

  <!-- 우: 데이터 테이블 -->
  <rect x="268" y="26" width="244" height="136" rx="6" fill="#fff" stroke="#E0E0E0"/>

  <!-- 헤더 -->
  <rect x="269" y="27" width="242" height="24" fill="#F5F5F5"/>
  <line x1="269" y1="51" x2="511" y2="49" stroke="#E0E0E0" stroke-width="1"/>
  <text x="288" y="41" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#424242">분기</text>
  <text x="340" y="41" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#424242">매출</text>
  <text x="400" y="41" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#424242">비용</text>
  <text x="460" y="41" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#424242">이익</text>

  <!-- 세로 구분선 -->
  <line x1="330" y1="25" x2="330" y2="162" stroke="#F5F5F5" stroke-width="1"/>
  <line x1="390" y1="25" x2="390" y2="162" stroke="#F5F5F5" stroke-width="1"/>
  <line x1="450" y1="25" x2="450" y2="162" stroke="#F5F5F5" stroke-width="1"/>

  <!-- Q1 -->
  <text x="288" y="66" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#424242">Q1</text>
  <text x="340" y="66" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#424242">250</text>
  <text x="400" y="66" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#424242">180</text>
  <text x="460" y="66" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#424242">70</text>
  <line x1="280" y1="72" x2="504" y2="72" stroke="#F5F5F5" stroke-width="1"/>

  <!-- Q2 -->
  <text x="288" y="90" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#424242">Q2</text>
  <text x="340" y="90" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#424242">280</text>
  <text x="400" y="90" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#424242">200</text>
  <text x="460" y="90" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#424242">80</text>
  <line x1="280" y1="96" x2="504" y2="96" stroke="#F5F5F5" stroke-width="1"/>

  <!-- Q3 -->
  <text x="288" y="114" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#424242">Q3</text>
  <text x="340" y="114" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#424242">300</text>
  <text x="400" y="114" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#424242">220</text>
  <text x="460" y="114" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#424242">80</text>
  <line x1="280" y1="120" x2="504" y2="120" stroke="#F5F5F5" stroke-width="1"/>

  <!-- Q4 -->
  <text x="288" y="138" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#424242">Q4</text>
  <text x="340" y="138" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#424242">260</text>
  <text x="400" y="138" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#424242">200</text>
  <text x="460" y="138" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#424242">60</text>
</svg>
