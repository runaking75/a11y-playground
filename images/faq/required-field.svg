<svg xmlns="http://www.w3.org/2000/svg" width="520" height="110">
  <text x="4" y="16" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="700" fill="#424242">필수 항목 표시 — 색에만 의존 금지</text>

  <!-- BAD -->
  <path d="M10,34 L18,42 M18,34 L10,42" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
  <text x="24" y="42" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#EF4444">빨간색 레이블만</text>

  <rect x="4" y="50" width="248" height="54" rx="6" fill="#fff" stroke="#E0E0E0"/>
  <text x="20" y="68" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#EF4444">이름</text>
  <rect x="20" y="74" width="216" height="24" rx="4" fill="none" stroke="#E0E0E0"/>

  <!-- GOOD -->
  <path d="M273,38 L276,42 L283,34" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="290" y="42" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#22C55E">색 + 텍스트 + 아이콘</text>

  <rect x="268" y="50" width="248" height="54" rx="6" fill="#fff" stroke="#E0E0E0"/>
  <text x="284" y="68" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#424242">이름</text>
  <text x="310" y="68" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#EF4444">* (필수)</text>
  <rect x="284" y="74" width="216" height="24" rx="4" fill="none" stroke="#E0E0E0"/>
</svg>
