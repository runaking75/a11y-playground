<svg xmlns="http://www.w3.org/2000/svg" width="520" height="210">
  <!-- GOOD icon + title -->
  <path d="M10,12 L13,16 L20,8" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="26" y="16" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="700" fill="#22C55E">올바른 포커스 순서</text>

  <!-- BAD icon + title -->
  <path d="M274,8 L282,16 M282,8 L274,16" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
  <text x="290" y="16" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="700" fill="#EF4444">잘못된 포커스 순서</text>

  <!-- GOOD card -->
  <rect x="4" y="28" width="248" height="120" rx="6" fill="#fff" stroke="#E0E0E0"/>
  <!-- 탭 -->
  <rect x="16" y="40" width="224" height="24" rx="4" fill="#F5F5F5"/>
  <circle cx="36" cy="52" r="10" fill="#424242"/>
  <text x="32" y="56" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="700" fill="#fff">1</text>
  <text x="52" y="56" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#424242">로그인</text>
  <text x="108" y="56" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#9E9E9E">|</text>
  <text x="120" y="56" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#9E9E9E">회원가입</text>

  <!-- 이메일 -->
  <rect x="16" y="76" width="120" height="24" rx="4" fill="none" stroke="#E0E0E0"/>
  <text x="28" y="92" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#9E9E9E">이메일</text>
  <circle cx="148" cy="88" r="10" fill="#424242"/>
  <text x="144" y="92" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="700" fill="#fff">2</text>

  <!-- 비밀번호 -->
  <rect x="16" y="108" width="120" height="24" rx="4" fill="none" stroke="#E0E0E0"/>
  <text x="28" y="124" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#9E9E9E">비밀번호</text>
  <circle cx="148" cy="120" r="10" fill="#424242"/>
  <text x="144" y="124" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="700" fill="#fff">3</text>

  <!-- 로그인 버튼 (2줄 높이) -->
  <rect x="164" y="76" width="64" height="56" rx="4" fill="#424242"/>
  <text x="178" y="108" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#fff">로그인</text>
  <circle cx="236" cy="104" r="10" fill="#424242"/>
  <text x="232" y="108" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="700" fill="#fff">4</text>

  <text x="16" y="164" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#757575">1→2→3→4 (회원가입은 ←→ 방향키)</text>

  <!-- BAD card -->
  <rect x="268" y="28" width="248" height="120" rx="6" fill="#fff" stroke="#E0E0E0"/>
  <!-- 탭 -->
  <rect x="280" y="40" width="224" height="24" rx="4" fill="#F5F5F5"/>
  <circle cx="300" cy="52" r="10" fill="#EF4444"/>
  <text x="296" y="56" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="700" fill="#fff">1</text>
  <text x="316" y="56" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#424242">로그인</text>
  <text x="372" y="56" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#9E9E9E">|</text>
  <circle cx="392" cy="52" r="10" fill="#EF4444"/>
  <text x="388" y="56" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="700" fill="#fff">2</text>
  <text x="408" y="56" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#9E9E9E">회원가입</text>

  <!-- 이메일 -->
  <rect x="280" y="76" width="120" height="24" rx="4" fill="none" stroke="#E0E0E0"/>
  <text x="292" y="92" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#9E9E9E">이메일</text>
  <circle cx="412" cy="88" r="10" fill="#EF4444"/>
  <text x="408" y="92" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="700" fill="#fff">3</text>

  <!-- 비밀번호 -->
  <rect x="280" y="108" width="120" height="24" rx="4" fill="none" stroke="#E0E0E0"/>
  <text x="292" y="124" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#9E9E9E">비밀번호</text>
  <circle cx="412" cy="120" r="10" fill="#EF4444"/>
  <text x="408" y="124" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="700" fill="#fff">5</text>

  <!-- 로그인 버튼 (2줄 높이) -->
  <rect x="428" y="76" width="64" height="56" rx="4" fill="#424242"/>
  <text x="442" y="108" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#fff">로그인</text>
  <circle cx="500" cy="104" r="10" fill="#EF4444"/>
  <text x="496" y="108" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="700" fill="#fff">4</text>

  <text x="280" y="164" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#757575">1→2(회원가입)→3→4(로그인)→5(비밀번호)</text>

  <!-- 하단 팁 -->
  <rect x="4" y="178" width="512" height="24" rx="6" fill="#F5F5F5"/>
  <text x="16" y="194" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#616161">💡 tabindex 양수 사용 금지. DOM 순서를 시각적 순서와 일치시키는 것이 원칙.</text>
</svg>
