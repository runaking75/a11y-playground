<svg xmlns="http://www.w3.org/2000/svg" width="520" height="148">
  <text x="8" y="14" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="700" fill="#424242">placeholder를 레이블 대신 사용하면 안 되는 이유</text>

  <!-- BAD -->
  <path d="M14,30 L22,38 M22,30 L14,38" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
  <text x="28" y="38" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#EF4444">placeholder만 사용</text>

  <!-- GOOD -->
  <path d="M277,34 L280,38 L287,30" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="294" y="38" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#22C55E">label + placeholder</text>

  <!-- BAD card -->
  <rect x="8" y="46" width="244" height="96" rx="6" fill="#fff" stroke="#E0E0E0"/>

  <text x="24" y="62" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#757575">입력 전</text>
  <rect x="24" y="66" width="212" height="22" rx="4" fill="none" stroke="#E0E0E0"/>
  <text x="32" y="81" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#BDBDBD">이메일 주소를 입력하세요</text>

  <text x="24" y="104" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#757575">입력 후</text>
  <rect x="24" y="108" width="212" height="22" rx="4" fill="none" stroke="#E0E0E0"/>
  <text x="32" y="123" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#424242">test@email.com</text>
  <text x="150" y="104" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#EF4444">← 이게 뭔 필드지?</text>

  <!-- GOOD card -->
  <rect x="268" y="46" width="244" height="96" rx="6" fill="#fff" stroke="#E0E0E0"/>

  <text x="284" y="62" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#757575">입력 전</text>
  <text x="284" y="81" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#424242">이메일</text>
  <rect x="324" y="66" width="172" height="22" rx="4" fill="none" stroke="#E0E0E0"/>
  <text x="332" y="81" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#BDBDBD">예: test@email.com</text>

  <text x="284" y="104" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#757575">입력 후</text>
  <text x="284" y="123" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#424242">이메일</text>
  <rect x="324" y="108" width="172" height="22" rx="4" fill="none" stroke="#E0E0E0"/>
  <text x="332" y="123" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#424242">test@email.com</text>
</svg>
